services:
  app-messaging:
    build:
      context: ../../          # Esto sube 3 niveles hasta la raíz de tu proyecto
      dockerfile: Dockerfile      # Indica que el archivo está ahí
    container_name: app-messaging
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongo1:27017,mongo2:27017,mongo3:27017/lab_messaging_app?replicaSet=rs0&retryWrites=true
    networks:
      - mongo-network
    depends_on:
      mongo1:
        condition: service_healthy
  mongo1:
    image: mongo:7.0
    container_name: mongo1
    command: ["--replSet", "rs0", "--bind_ip_all"]
    networks:
      - mongo-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo2:
    image: mongo:7.0
    container_name: mongo2
    command: ["--replSet", "rs0", "--bind_ip_all"]
    networks:
      - mongo-network

  mongo3:
    image: mongo:7.0
    container_name: mongo3
    command: ["--replSet", "rs0", "--bind_ip_all"]
    networks:
      - mongo-network

